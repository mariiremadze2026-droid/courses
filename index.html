<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Space Academy - LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero h1 {
      font-size: 4rem;
      margin-bottom: 20px;
      text-shadow: 0 0 30px rgba(100, 150, 255, 0.8);
    }
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      padding: 40px 0;
    }
    .course-card {
      transition: 0.4s;
    }
    .course-card:hover {
      transform: translateY(-15px);
    }
  </style>
</head>
<body>
  <nav>
    <div style="max-width: 1400px; margin: 0 auto; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;">
      <h2 onclick="window.location.href='index.html'" style="cursor:pointer; color:#64b5ff;">🌌 Deep Space Academy</h2>
      <div style="display:flex; gap:25px; font-size:1.1rem;">
        <a href="index.html" style="color:#64b5ff; font-weight:bold;">მთავარი</a>
        <a href="books.html">წიგნები</a>
        <a href="history.html">ლიტერატურის ისტორია</a>
        <a href="dashboard.html">სტუდენტის დაფა</a>
        <a href="admin.html">ადმინ პანელი</a>
        <a href="auth.html" onclick="logout()">გამოსვლა</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="hero glass" style="margin: 40px; border-radius: 24px;">
    <div>
      <h1>მოგესალმებით Deep Space Academy-ში</h1>
      <p style="font-size:1.5rem; margin:20px 0;">შეისწავლე, განვითარდი და აღმოაჩინე სამყარო ქართული ლიტერატურისა და თანამედროვე ცოდნის საშუალებით</p>
      <button onclick="window.location.href='books.html'" class="btn-neon" style="font-size:1.3rem; padding:16px 40px;">
        დაიწყე სწავლა
      </button>
    </div>
  </div>

  <div style="max-width: 1400px; margin: 0 auto; padding: 0 40px 80px;">
    <h2 style="text-align:center; margin:60px 0 40px; font-size:2.5rem;">ხელმისაწვდომი კურსები</h2>
    
    <div class="course-grid" id="coursesContainer">
      <!-- კურსები JavaScript-ით დაემატება -->
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const sampleCourses = [
      { id: 1, title: "ქართული ლიტერატურის ისტორია", desc: "შოთა რუსთაველიდან თანამედროვე მწერლებამდე", instructor: "დოქტორი ანა ქევხიშვილი" },
      { id: 2, title: "ვეფხისტყაოსანი - სიღრმისეული ანალიზი", desc: "რუსთაველის შედევრის ფილოსოფიური და ლიტერატურული ანალიზი", instructor: "პროფ. გიორგი მაისურაძე" },
      { id: 3, title: "თანამედროვე ქართული პროზა", desc: "XXI საუკუნის ქართული ლიტერატურა", instructor: "მწერალი დათო ტურაშვილი" },
      { id: 4, title: "შემოქმედებითი წერა", desc: "როგორ დავწეროთ კარგი მოთხრობა და რომანი", instructor: "ეკა ქევხიშვილი" }
    ];

    function renderCourses() {
      const container = document.getElementById('coursesContainer');
      container.innerHTML = '';

      sampleCourses.forEach(course => {
        const card = `
          <div class="course-card glass" style="padding:25px; height:100%;">
            <h3 style="margin-bottom:15px;">${course.title}</h3>
            <p style="margin-bottom:20px; color:#ccc;">${course.desc}</p>
            <p><strong>ინსტრუქტორი:</strong> ${course.instructor}</p>
            <button onclick="alert('კურსი "${course.title}" დაემატა თქვენს დაფაზე!')" class="btn-neon" style="margin-top:20px; width:100%;">
              დარეგისტრირდი კურსზე
            </button>
          </div>`;
        container.innerHTML += card;
      });
    }

    window.onload = () => {
      renderCourses();
    };
  </script>
</body>
</html>
