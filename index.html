
<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>StudyHub Pro</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">STUDY<span>HUB</span></div>
        <div class="menu">
            <button onclick="showPage('library')">ბიბლიოთეკა</button>
            <button onclick="showPage('writing')">დავალებები</button>
        </div>
    </nav>

    <section id="library" class="page">
        <div id="library-grid" class="grid"></div>
    </section>

    <section id="reader" class="page" style="display:none;">
        <div id="book-canvas"></div>
    </section>

    <section id="writing" class="page" style="display:none;">
        <div class="editor-wrap">
            <div id="editor"></div>
            <button class="action-btn">შენახვა</button>
        </div>
    </section>

    <div id="ai-widget">
        <div id="chat-box" style="display:none;">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="ჰკითხე AI-ს...">
        </div>
        <button onclick="toggleChat()">🤖</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
