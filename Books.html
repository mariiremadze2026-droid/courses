<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>წიგნები | Deep Space Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 30px 0;
    }
    .book-card {
      text-align: center;
      transition: 0.4s;
    }
    .book-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 20px 40px rgba(100, 150, 255, 0.3);
    }
    .book-card img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      border-radius: 12px;
    }
    .genre {
      display: inline-block;
      background: rgba(100, 150, 255, 0.2);
      color: #64b5ff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <nav>
    <div style="max-width: 1400px; margin: 0 auto; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
      <h2 onclick="window.location.href='index.html'" style="cursor:pointer; color:#64b5ff;">Deep Space Academy</h2>
      <div>
        <a href="index.html">მთავარი</a> |
        <a href="dashboard.html">დაფა</a> |
        <a href="books.html" style="color:#64b5ff; font-weight:bold;">წიგნები</a> |
        <a href="history.html">ლიტერატურის ისტორია</a> |
        <a href="assignments.html">დავალებები</a> |
        <a href="#" onclick="logout()">გამოსვლა</a>
      </div>
    </div>
  </nav>

  <div style="max-width: 1400px; margin: 0 auto; padding: 40px 30px;">
    <h1 style="text-align:center; margin-bottom:40px; font-size:2.8rem;">📖 ქართული წიგნების ბიბლიოთეკა</h1>

    <div class="books-grid" id="booksContainer"></div>
  </div>

  <!-- Reader Modal -->
  <div id="readerModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000;">
    <div class="reader-container glass" style="margin:20px; height:calc(100vh - 40px);">
      <div class="reader-header">
        <div id="readerBookTitle" style="font-size:1.4rem; font-weight:bold;"></div>
        <div style="margin-left:auto; display:flex; gap:10px;">
          <button onclick="changeFontSize(-2)" class="btn-neon">A−</button>
          <button onclick="changeFontSize(2)" class="btn-neon">A+</button>
          <select id="fontFamily" onchange="changeFontFamily()" class="glass" style="padding:8px; background:#1a1a2e; color:white; border:none;">
            <option value="Georgia, serif">Serif</option>
            <option value="system-ui, sans-serif" selected>Sans-serif</option>
          </select>
          <select id="themeSelect" onchange="changeTheme()" class="glass" style="padding:8px; background:#1a1a2e; color:white; border:none;">
            <option value="dark">🌙 Dark</option>
            <option value="sepia">📜 Sepia</option>
            <option value="light">☀️ Light</option>
          </select>
          <button onclick="toggleFullscreen()" class="btn-neon">⛶</button>
          <button onclick="closeReader()" class="btn-neon">✕</button>
        </div>
      </div>

      <div class="reader-body">
        <div class="reader-sidebar">
          <h3>სარჩევი</h3>
          <ul id="tocList" style="list-style:none;"></ul>
        </div>
        <div class="reader-content" id="readerContent">
          <div id="bookText" class="book-text"></div>
        </div>
      </div>

      <div class="reader-footer">
        <button onclick="prevChapter()" id="prevBtn" class="btn-neon">‹ წინა</button>
        <div class="progress-container" style="flex:1; margin:0 20px;">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <span id="progressText" style="width:60px; text-align:right;">0%</span>
        <button onclick="nextChapter()" id="nextBtn" class="btn-neon">შემდეგი ›</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // books.html-ის სპეციფიური კოდი
    function renderBooks() {
      const container = document.getElementById('booksContainer');
      container.innerHTML = '';

      booksDatabase.forEach(book => {
        const cardHTML = `
          <div class="book-card glass" onclick="openReader(${book.id})" style="cursor:pointer; padding:15px;">
            <img src="${book.cover}" alt="${book.title}">
            <h3 style="margin:15px 0 8px;">${book.title}</h3>
            <p style="color:#aaa;">${book.author}</p>
            <span class="genre">${book.genre}</span>
          </div>`;
        container.innerHTML += cardHTML;
      });
    }

    // გვერდის ჩატვირთვისას
    window.onload = () => {
      renderBooks();
    };
  </script>
</body>
</html>
