<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ლიტერატურის ისტორია | Deep Space Academy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div style="max-width: 1400px; margin: 0 auto; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
      <h2 onclick="window.location.href='index.html'" style="cursor:pointer; color:#64b5ff;">Deep Space Academy</h2>
      <div>
        <a href="index.html">მთავარი</a> |
        <a href="dashboard.html">დაფა</a> |
        <a href="books.html">წიგნები</a> |
        <a href="history.html" style="color:#64b5ff; font-weight:bold;">ლიტერატურის ისტორია</a> |
        <a href="assignments.html">დავალებები</a> |
        <a href="#" onclick="logout()">გამოსვლა</a>
      </div>
    </div>
  </nav>

  <div style="max-width: 1200px; margin: 0 auto; padding: 50px 30px;">
    <h1 style="text-align:center; margin-bottom:50px; font-size:2.8rem;">📜 ქართული ლიტერატურის ისტორია</h1>

    <div id="historyContainer" class="timeline"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderHistory() {
      const container = document.getElementById('historyContainer');
      container.innerHTML = '';

      literatureHistory.forEach((item, index) => {
        const card = `
          <div class="glass timeline-item" style="padding:30px; margin-bottom:30px;">
            <h2 style="color:#64b5ff; margin-bottom:15px;">${item.period}</h2>
            <p style="font-size:1.1rem; margin-bottom:20px;">${item.description}</p>
            
            <strong>მთავარი ფიგურები:</strong>
            <p style="margin:10px 0 20px;">${item.key_figures}</p>
            
            <strong>მნიშვნელოვანი ნაწარმოებები:</strong>
            <p>${item.works}</p>
          </div>`;
        container.innerHTML += card;
      });
    }

    window.onload = renderHistory;
  </script>
</body>
</html>
