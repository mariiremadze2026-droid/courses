<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>შესვლა - Deep Space Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      max-width: 420px;
      margin: 100px auto;
      padding: 50px 40px;
    }
    .tab {
      display: inline-block;
      padding: 12px 30px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab.active {
      border-bottom: 3px solid #64b5ff;
      color: #64b5ff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <nav>
    <div style="max-width: 1400px; margin: 0 auto; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;">
      <h2 onclick="window.location.href='index.html'" style="cursor:pointer; color:#64b5ff;">🌌 Deep Space Academy</h2>
    </div>
  </nav>

  <div class="auth-container glass">
    <h1 style="text-align:center; margin-bottom:40px;">მოგესალმებით</h1>

    <!-- ტაბები -->
    <div style="text-align:center; margin-bottom:30px;">
      <span onclick="switchTab(0)" id="loginTab" class="tab active">შესვლა</span>
      <span onclick="switchTab(1)" id="registerTab" class="tab">რეგისტრაცია</span>
    </div>

    <!-- შესვლის ფორმა -->
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="ელფოსტა" class="glass" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px; font-size:1.1rem;">
      <input type="password" id="loginPassword" placeholder="პაროლი" class="glass" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px; font-size:1.1rem;">
      <button onclick="handleLogin()" class="btn-neon" style="width:100%; padding:16px; margin-top:20px; font-size:1.2rem;">შესვლა</button>
      
      <p style="text-align:center; margin-top:25px; color:#aaa;">
        Demo ანგარიშები:<br>
        student@lms.ge / student123<br>
        admin@lms.ge / admin123
      </p>
    </div>

    <!-- რეგისტრაციის ფორმა (დემო) -->
    <div id="registerForm" style="display:none;">
      <input type="text" id="regUsername" placeholder="სრული სახელი" class="glass" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px;">
      <input type="email" id="regEmail" placeholder="ელფოსტა" class="glass" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px;">
      <input type="password" id="regPassword" placeholder="პაროლი" class="glass" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px;">
      <button onclick="alert('რეგისტრაცია წარმატებით დასრულდა! (დემო რეჟიმი)')" class="btn-neon" style="width:100%; padding:16px; margin-top:20px; font-size:1.2rem;">რეგისტრაცია</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('loginForm').style.display = tab === 0 ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 1 ? 'block' : 'none';
      
      document.getElementById('loginTab').classList.toggle('active', tab === 0);
      document.getElementById('registerTab').classList.toggle('active', tab === 1);
    }

    function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      login(email, password);
    }

    // გვერდის ჩატვირთვისას
    window.onload = () => {
      switchTab(0);
    };
  </script>
</body>
</html>
